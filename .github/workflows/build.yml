name: Rebuild data.js from CSV

on:
  schedule:
    # daily_crawl.yml の後に動くよう調整 (UTC 17:00 にクロール開始 → UTC 20:00 にビルド)
    - cron: '0 20 * * *'   # UTC 20:00 = JST 翌05:00
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'build.py'
      - 'build_config.json'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl google-api-python-client google-auth

      - name: Build data.js from CSV
        env:
          DATA_SOURCE: csv
          CSV_DRIVE_FILE_ID: ${{ secrets.CSV_DRIVE_FILE_ID }}
          OUTPUT_FOLDER_ID: ${{ secrets.OUTPUT_FOLDER_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SUBJECT_EMAIL: ${{ secrets.SUBJECT_EMAIL }}
        run: |
          python build.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "data.js に変更なし"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "data.js が更新されました"
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "chore: data.js を自動更新 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
