name: 共有ドライブ フォルダ構造 日次抽出

on:
  schedule:
    - cron: '0 17 * * *'   # UTC 17:00 = JST 翌02:00
  workflow_dispatch:
    inputs:
      output_folder_id:
        description: '出力先フォルダID（空白でSecrets設定値を使用）'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - '.github/workflows/daily_crawl.yml'

jobs:
  crawl:
    name: Drive クロール & CSV 出力
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          OUTPUT_FOLDER_ID: ${{ inputs.output_folder_id || secrets.OUTPUT_FOLDER_ID || '1ZqjDtUgYzueDU2_I0FJifiNPV1QFdnBF' }}
          SUBJECT_EMAIL: ${{ secrets.SUBJECT_EMAIL }}
        run: |
          python main.py

      - name: Upload CSV as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-drive-structure-${{ github.run_id }}
          path: shared_drive_structure.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::クロールが失敗しました。ログを確認してください。"
          echo "実行ID: ${{ github.run_id }}"
